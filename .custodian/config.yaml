repo_key: CxRP
src_root: cxrp
tests_root: tests

# Minimum baseline — runs Custodian's generic C1-C8 only.
# Add `plugins:` and `detectors:` here when this repo grows its own
# `_custodian/` overlay layer (see OperationsCenter for a worked example).

audit:
  # K1 suppressions: `claude_cli` appears in README as an example string ("e.g. `claude_cli`")
  # within an executor enumeration context — not a Python function reference.
  common_words:
    - claude_cli
    - coding_agent
    - review_agent

  # F1 exemptions: these fields are in nested contract dataclasses (Artifact,
  # LaneAlternative, ExecutionLimits) that lack their own to_dict() but are
  # recursively serialized via asdict() from their parent BaseContract subclass.
  # All are part of the JSON schema and are not dead fields.
  f1_exempt:
    - description
    - max_changed_files
    - metadata
    - reason
    - require_clean_validation

  exclude_paths:
    T2:
      # These tests validate that valid payloads pass JSON schema validation.
      # validate_contract() / validate_payload() return None and raise ValidationError
      # on failure — "should not raise" tests are correctly assertion-free.
      - tests/test_contracts.py
      - tests/test_evidence.py
      - tests/test_execution_target.py
      - tests/test_runtime_binding.py
    T1:
      # BaseContract is an abstract base serialized via asdict() — it is always
      # used through its concrete subclasses, never instantiated directly in tests.
      - cxrp/contracts/common.py
    T6:
      # Contract dataclasses are validated through schema-comparison tests,
      # not by direct import — the test suite uses the contract names but not
      # the source modules.
      - "cxrp/contracts/**"
      - "cxrp/validation/**"
      - "cxrp/vocabulary/**"
    T7:
      - "cxrp/contracts/**"
      - "cxrp/validation/**"
      - "cxrp/vocabulary/**"


tools:
  ruff: true
  vulture: true
  # mypy/ty: enable when type annotations are stable
  # semgrep: true  # add rules/semgrep/ dir with custom rules to enable

# ---------------------------------------------------------------------------
# Privacy / boundary enforcement (Custodian B-class)
# ---------------------------------------------------------------------------
# Names listed here cause Custodian B1 to fail any tracked file that
# mentions them. Default excludes (.console/**, config/managed_repos/local/**,
# docs/history/**, tools/audit/report/**, .custodian/config.yaml itself)
# spare operator-private and historical surfaces.
privacy:
  private_repo_names:
    - VideoFoundry
    - videofoundry
